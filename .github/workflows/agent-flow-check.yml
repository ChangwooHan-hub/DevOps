name: Agent Flow Check

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  validate-flow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate agent flow
        run: python scripts/validate_agent_flow.py
